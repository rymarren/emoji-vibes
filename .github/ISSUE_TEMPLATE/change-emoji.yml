name: Change Emoji Vibe
description: Propose a different meaning for an existing emoji
labels: [vote-open]
title: "[change] EMOJI — "
body:
  - type: markdown
    attributes:
      value: |
        👍 this issue to approve, 👎 to reject.
        Voting closes 7 days after creation. Needs 70% approval with at least 3 votes.
  - type: input
    id: emoji
    attributes:
      label: Emoji
      placeholder: "🤠"
    validations:
      required: true
  - type: input
    id: meaning
    attributes:
      label: Proposed new meaning
      placeholder: "Confidence, swagger, owning it"
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated short tags for matching
      placeholder: "confident, swagger, bold"
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why?
      placeholder: "Explain why this meaning fits better"
    validations:
      required: false
