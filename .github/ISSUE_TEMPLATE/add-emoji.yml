name: Add Emoji
description: Propose a new emoji vibe for the set
labels: [vote-open]
title: "[add] EMOJI — "
body:
  - type: markdown
    attributes:
      value: |
        👍 this issue to approve, 👎 to reject.
        Voting closes 7 days after creation. Needs 70% approval with at least 3 votes.
  - type: input
    id: emoji
    attributes:
      label: Emoji
      placeholder: "🦆"
    validations:
      required: true
  - type: input
    id: meaning
    attributes:
      label: Proposed meaning
      placeholder: "When something just works and you don't question it"
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated short tags for matching
      placeholder: "just-works, magic, unexplained"
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why?
      placeholder: "Explain why this emoji deserves a spot in the vibe set"
    validations:
      required: false
